server:
  port: 8080

spring:
  application:
    name: EDULEARN-API-GATEWAY

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/v1/auth/**,/api/v1/admin/users/**,/oauth2/**,/login/**

          - id: auth-service-docs
            uri: http://localhost:8081
            predicates:
              - Path=/v3/api-docs/auth-service
            filters:
              - RewritePath=/v3/api-docs/auth-service, /v3/api-docs

          - id: course-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/v1/courses/**

          - id: course-service-docs
            uri: http://localhost:8082
            predicates:
              - Path=/v3/api-docs/course-service
            filters:
              - RewritePath=/v3/api-docs/course-service, /v3/api-docs

          - id: lesson-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/lessons/**

          - id: lesson-service-docs
            uri: http://localhost:8083
            predicates:
              - Path=/v3/api-docs/lesson-service
            filters:
              - RewritePath=/v3/api-docs/lesson-service, /v3/api-docs

          - id: enrollment-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/v1/enrollments/**

          - id: enrollment-service-docs
            uri: http://localhost:8084
            predicates:
              - Path=/v3/api-docs/enrollment-service
            filters:
              - RewritePath=/v3/api-docs/enrollment-service, /v3/api-docs

          - id: assessment-service
            uri: http://localhost:8085
            predicates:
              - Path=/api/v1/quizzes/**,/api/v1/attempts/**

          - id: assessment-service-docs
            uri: http://localhost:8085
            predicates:
              - Path=/v3/api-docs/assessment-service
            filters:
              - RewritePath=/v3/api-docs/assessment-service, /v3/api-docs

          - id: progress-service
            uri: http://localhost:8086
            predicates:
              - Path=/api/v1/progress/**

          - id: progress-service-docs
            uri: http://localhost:8086
            predicates:
              - Path=/v3/api-docs/progress-service
            filters:
              - RewritePath=/v3/api-docs/progress-service, /v3/api-docs

          - id: payment-service
            uri: http://localhost:8087
            predicates:
              - Path=/api/v1/payments/**,/api/v1/admin/payments/**

          - id: payment-service-docs
            uri: http://localhost:8087
            predicates:
              - Path=/v3/api-docs/payment-service
            filters:
              - RewritePath=/v3/api-docs/payment-service, /v3/api-docs

          - id: notification-service
            uri: http://localhost:8088
            predicates:
              - Path=/api/v1/notifications/**

          - id: notification-service-docs
            uri: http://localhost:8088
            predicates:
              - Path=/v3/api-docs/notification-service
            filters:
              - RewritePath=/v3/api-docs/notification-service, /v3/api-docs

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "https://edulearnweb.duckdns.org"
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 86400000

logging:
  level:
    root: INFO
    com.edulearn.gateway: INFO

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: Auth Service
        url: /v3/api-docs/auth-service
      - name: Course Service
        url: /v3/api-docs/course-service
      - name: Lesson Service
        url: /v3/api-docs/lesson-service
      - name: Enrollment Service
        url: /v3/api-docs/enrollment-service
      - name: Assessment Service
        url: /v3/api-docs/assessment-service
      - name: Progress Service
        url: /v3/api-docs/progress-service
      - name: Payment Service
        url: /v3/api-docs/payment-service
      - name: Notification Service
        url: /v3/api-docs/notification-service
  servers:
    - url: https://edulearnweb.duckdns.org
      description: Production Server
