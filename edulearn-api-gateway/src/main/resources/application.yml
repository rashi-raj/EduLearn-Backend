server:
  port: 8080

spring:
  application:
    name: EDULEARN-API-GATEWAY

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

  cloud:
    gateway:
      mvc:
        routes:
          - id: auth-service
            uri: http://localhost:8081
            predicates:
              - Path=/api/v1/auth/**,/api/v1/admin/users/**,/oauth2/**,/login/**,/v3/api-docs/auth-service

          - id: course-service
            uri: http://localhost:8082
            predicates:
              - Path=/api/v1/courses/**,/v3/api-docs/course-service

          - id: lesson-service
            uri: http://localhost:8083
            predicates:
              - Path=/api/v1/lessons/**,/v3/api-docs/lesson-service

          - id: enrollment-service
            uri: http://localhost:8084
            predicates:
              - Path=/api/v1/enrollments/**,/v3/api-docs/enrollment-service

          - id: assessment-service
            uri: http://localhost:8085
            predicates:
              - Path=/api/v1/quizzes/**,/api/v1/attempts/**,/v3/api-docs/assessment-service

          - id: progress-service
            uri: http://localhost:8086
            predicates:
              - Path=/api/v1/progress/**,/v3/api-docs/progress-service

          - id: payment-service
            uri: http://localhost:8087
            predicates:
              - Path=/api/v1/payments/**,/api/v1/admin/payments/**,/v3/api-docs/payment-service

          - id: notification-service
            uri: http://localhost:8088
            predicates:
              - Path=/api/v1/notifications/**,/v3/api-docs/notification-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings,gateway

logging:
  level:
    root: INFO
    com.edulearn.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springdoc: INFO

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    urls:
      - name: API Gateway
        url: /v3/api-docs
      - name: Auth Service
        url: /v3/api-docs/auth-service
      - name: Course Service
        url: /v3/api-docs/course-service
      - name: Lesson Service
        url: /v3/api-docs/lesson-service
      - name: Enrollment Service
        url: /v3/api-docs/enrollment-service
      - name: Assessment Service
        url: /v3/api-docs/assessment-service
      - name: Progress Service
        url: /v3/api-docs/progress-service
      - name: Payment Service
        url: /v3/api-docs/payment-service
      - name: Notification Service
        url: /v3/api-docs/notification-service